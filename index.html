<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhon & Keyla - Save the Date</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Monsieur+La+Doulaise&family=Montserrat:wght@200;400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --olivo: #556b2f;
            --blanco: #ffffff;
            --sombra: 2px 2px 15px rgba(0, 0, 0, 0.6);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
        }

        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            /* Overlay oscuro para que el texto blanco de Canva resalte */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)), url('fondo.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            animation: fadeIn 3s ease;
        }

        /* Estilo "Save the Date" manuscrito */
        .header-script {
            font-family: 'Monsieur La Doulaise', cursive;
            font-size: clamp(3rem, 10vw, 5rem);
            color: var(--blanco);
            margin-bottom: -20px;
            /* Para que se junte con el texto de abajo */
            text-shadow: var(--sombra);
        }

        .sub-header {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            letter-spacing: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* NOMBRES ESTILO OLIVIA & THOMAS */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            /* Peso ligero */
            text-transform: uppercase;
            /* Siempre en mayúsculas */
            letter-spacing: 12px;
            /* Este es el secreto para que se vea así de elegante */
            color: white;
            text-align: center;
        }

        .divisor {
            width: 80px;
            height: 1px;
            background-color: var(--olivo);
            margin: 20px auto;
        }

        .fecha {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            letter-spacing: 5px;
            font-weight: 400;
            text-shadow: var(--sombra);
        }

        .lugar {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 15px 0 40px;
            font-weight: 300;
        }

        /* CONTADOR */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
        }

        .count-item span {
            display: block;
        }

        .num {
            font-size: 1.5rem;
            font-weight: 400;
            font-family: 'Cormorant Garamond';
        }

        .lab {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        /* VERSÍCULO */
        .versiculo {
            font-size: 0.75rem;
            font-style: italic;
            max-width: 450px;
            margin: 0 auto 30px;
            line-height: 1.8;
            font-weight: 200;
            text-shadow: var(--sombra);
        }

        .btn-wa {
            background-color: var(--olivo);
            color: white;
            padding: 14px 40px;
            text-decoration: none;
            border-radius: 2px;
            /* Botón cuadrado elegante */
            font-size: 0.75rem;
            letter-spacing: 3px;
            font-weight: 400;
            transition: 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-wa:hover {
            background-color: #3e4e22;
            letter-spacing: 4px;
        }

        #music-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="container">
            <div class="header-script">Save the Date</div>
            <div class="sub-header">PARA CELEBRAR EL MATRIMONIO DE</div>

            <h1>Jhon & Keyla</h1>

            <div class="divisor"></div>

            <div class="fecha">07 . NOVIEMBRE . 2026</div>
            <div class="lugar">Vía a la Costa, Guayaquil</div>

            <div class="countdown">
                <div class="count-item"><span class="num" id="d">00</span><span class="lab">Días</span></div>
                <div class="count-item"><span class="num" id="h">00</span><span class="lab">Horas</span></div>
                <div class="count-item"><span class="num" id="m">00</span><span class="lab">Min</span></div>
                <div class="count-item"><span class="num" id="s">00</span><span class="lab">Seg</span></div>
            </div>

            <div class="versiculo">
                "El amor es paciente y bondadoso; no es envidioso ni jactancioso, no se envanece..." <br> <strong>- 1
                    Corintios 13:4-5</strong>
            </div>

            <a href="https://wa.me/593978941301?text=¡Confirmamos%20asistencia!" class="btn-wa">CONFIRMAR ASISTENCIA</a>
        </div>
    </section>

    <audio id="track" loop>
        <source src="musica-save.mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" onclick="playM()"><i id="m-icon" class="fas fa-music"></i></button>

    <script>
        const target = new Date("Nov 7, 2026 17:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("d").innerText = Math.floor(diff / (86400000));
            document.getElementById("h").innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById("m").innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById("s").innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);

        const a = document.getElementById('track');
        function playM() {
            if (a.paused) { a.play(); document.getElementById('m-icon').className = 'fas fa-pause'; }
            else { a.pause(); document.getElementById('m-icon').className = 'fas fa-music'; }
        }
        document.body.addEventListener('click', () => { if (a.paused) playM(); }, { once: true });
    </script>
</body>

</html>
