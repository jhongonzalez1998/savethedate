<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta property="og:type" content="website">
    <meta property="og:title" content="💍 Jhon & Keyla | ¡Save the Date! 💍">
    <meta property="og:description" content="Te invitamos a nuestra boda el 07.NOV.2026. ¡Confirma aquí! ✨">
    <meta property="og:url" content="https://jhongonzalez1998.github.io/savethedate/">

    <meta property="og:image" content="https://jhongonzalez1998.github.io/savethedate/miniatura.jpg">
    <meta property="og:image:secure_url" content="https://jhongonzalez1998.github.io/savethedate/miniatura.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://jhongonzalez1998.github.io/savethedate/miniatura.jpg">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhon & Keyla | Save the Date 💍</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>💍</text></svg>">
    <meta name="theme-color" content="#556b2f">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&family=Playwrite+IE:wght@100..400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --blanco: #ffffff;
            --olivo: #a38653;
            --olivo-hover: #806838;
            --sombra: 2px 2px 10px rgba(0, 0, 0, 0.6);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)), url('foto.jpg');
            background-size: cover;
            background-position: top center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            padding: 80px 20px;
        }

        .content-block {
            width: 100%;
            z-index: 2;
        }

        /* --- CONTENEDOR SAVE THE DATE --- */
        .save-date-container {
            position: relative;
            display: inline-block;
            margin-bottom: 0;
        }

        .sd-main {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 12px;
            font-size: clamp(2.2rem, 10vw, 4.5rem);
            line-height: 1.2;
            text-shadow: var(--sombra);
        }

        /* "the" con Playwrite IE */
        .sd-script {
            position: absolute;
            top: 50%;
            left: 50%;
            /* Ajuste vertical específico para Playwrite IE */
            transform: translate(-50%, -50%);
            font-family: 'Playwrite IE', cursive;
            font-weight: 100;
            /* Delgada para que se vea elegante */
            font-size: clamp(1.8rem, 8vw, 3rem);
            /* Tamaño ajustado para esta fuente */
            text-transform: none;
            opacity: 0.9;
            pointer-events: none;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.9rem, 4vw, 1.4rem);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: -5px 0 0 0;
            text-shadow: var(--sombra);
            opacity: 0.9;
        }

        /* --- PARTE INFERIOR --- */
        .fecha {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: var(--sombra);
        }

        .cita-biblica {
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .btn-wa {
            background-color: var(--olivo);
            color: white;
            padding: 14px 0;
            width: 100%;
            max-width: 280px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 10;
        }

        .btn-wa:hover {
            background-color: var(--olivo-hover) !important;
            transform: scale(1.05);
        }

        #music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .hero {
            animation: fadeIn 2s ease;
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="top-content content-block">
            <div class="save-date-container">
                <div class="sd-main">SAVE&nbsp;&nbsp;DATE</div>
                <div class="sd-script">&nbsp;&nbsp;the&nbsp;&nbsp;&nbsp;</div>
            </div>
            <h1>Jhon & Keyla</h1>
        </div>

        <div class="bottom-content content-block">
            <div class="fecha">07 . NOV . 2026</div>
            <div class="cita-biblica">1 Corintios 13:4-5</div>

            <a href="#" class="btn-wa" id="confirmarBtn">
                Confirmar Asistencia
            </a>
            <br>
            </br>
        </div>
    </section>

    <audio id="musica" loop>
        <source src="musica-save.mp3" type="audio/mpeg">
    </audio>
    <button id="music-btn" onclick="playM()"><i id="icon" class="fas fa-music"></i></button>

    <script>
        const a = document.getElementById('musica');
        function playM() {
            if (a.paused) { a.play(); document.getElementById('icon').className = 'fas fa-pause'; }
            else { a.pause(); document.getElementById('icon').className = 'fas fa-music'; }
        }
        document.body.addEventListener('click', () => { if (a.paused) playM(); }, { once: true });
    </script>
    <script>
        document.getElementById('confirmarBtn').addEventListener('click', function (e) {
            e.preventDefault();

            const telefono = "593978941301";

            // \n crea el salto de línea en WhatsApp
            const saludo = "\u00a1Hola Jhon & Keyla! \ud83d\udc8d\n\n";
            const cuerpo = "Confirmo con mucha alegr\u00eda mi asistencia a su boda.\n\n";
            const cierre = "\u00a1Nos vemos el 07 de Noviembre! \u2728";

            const mensajeCompleto = saludo + cuerpo + cierre;

            const url = "https://api.whatsapp.com/send?phone=" + telefono + "&text=" + encodeURIComponent(mensajeCompleto);

            window.open(url, '_blank', 'noopener,noreferrer');
        });
    </script>
</body>

</html>
